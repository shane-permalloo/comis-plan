<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMIS Project Plan - Visual Timeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; background: #f0f2f5; }

    .container { max-width: 100%; background: white; overflow: hidden; }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: white; padding: 18px 24px; text-align: center;
    }
    .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .header .subtitle { font-size: 16px; opacity: .88; margin-top: 4px; line-height: 1.6; max-width: 1180px; min-width: 92vh; margin-left: auto; margin-right: auto; }
    .header .meta { margin-top: 10px; font-size: 12px; opacity: .65; }

    /* ── Gantt wrapper ────────────────────────────────────────────── */
    .gantt-wrapper { overflow-x: auto; position: relative; }

    .gantt-table { width: 100%; border-collapse: collapse; min-width: 1300px; table-layout: fixed; }

    /* ── thead ────────────────────────────────────────────────────── */
    .gantt-table thead th {
      background: #34495e; color: white;
      padding: 8px 4px; text-align: center;
      font-size: 12px; font-weight: 600;
      border: 0;
      position: sticky; top: 0; z-index: 10;
      white-space: nowrap;
    }
    .gantt-table thead th.task-col {
      text-align: left; width: 250px; min-width: 250px; max-width: 250px;
      font-size: 13px;
      border: 0;
    }
    .gantt-table thead th.today-col {
      background: #922b21; font-weight: 700;
    }
    .today-label {
      display: block; font-size: 9px; font-weight: 700;
      background: #e74c3c; border-radius: 3px; padding: 1px 4px;
      margin-top: 3px; letter-spacing: .5px;
    }

    /* ── tbody ────────────────────────────────────────────────────── */
    .gantt-table tbody td {
      border: 1px solid #dee2e6; padding: 0;
      font-size: 13px; height: 36px; vertical-align: middle;
      position: relative;
    }
    .gantt-table tbody td.task-col {
      background: #f8f9fa; font-weight: 500; color: #2c3e50;
      padding: 6px 10px; white-space: nowrap;
      width: 250px; min-width: 250px; max-width: 250px;
      overflow: hidden; text-overflow: ellipsis;
      border: 0;
    }

    /* ── Phase row (bold header) ──────────────────────────────────── */
    tr.phase-row td.task-col {
      background: #2c3e50 !important; color: white !important;
      font-weight: 700 !important; text-transform: uppercase;
      letter-spacing: .5px; border-left: 4px solid #e74c3c;
    }

    /* ── Campaign row (hatched) ───────────────────────────────────── */
    tr.campaign-row td {
      border-top: 2px solid rgba(26,188,156,.55) !important;
      border-bottom: 2px solid rgba(26,188,156,.55) !important;
      background: repeating-linear-gradient(
        -45deg,
        rgba(26,188,156,.07) 0px, rgba(26,188,156,.07) 5px,
        transparent 5px, transparent 10px
      );
    }
    tr.campaign-row td.task-col {
      background: repeating-linear-gradient(
        -45deg,
        rgba(26,188,156,.18) 0px, rgba(26,188,156,.18) 5px,
        #ecfaf6 5px, #ecfaf6 10px
      ) !important;
      border-left: 5px solid #1abc9c !important;
      color: #0d6b57 !important;
      font-weight: 700 !important;
    }

    /* ── Deliverable row ──────────────────────────────────────────── */
    tr.deliverable-row td.task-col {
      background: #fffbea !important; border-left: 4px solid #f1c40f;
    }

    /* ── Today column highlight ───────────────────────────────────── */
    td.today-col { background: rgba(231,76,60,.04) !important; }
    td.task-col.today-col { background: #f8f9fa !important; }

    /* ── Today vertical line (CSS pseudo on wrapper) ──────────────── */
    .gantt-table td.today-col:not(.task-col) {
      border-left: 2px dashed rgba(231,76,60,.6) !important;
      border-right: 2px dashed rgba(231,76,60,.6) !important;
    }

    /* ── Bar ──────────────────────────────────────────────────────── */
    .bar {
      height: 24px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
      text-transform: uppercase; letter-spacing: .5px;
      white-space: nowrap; overflow: hidden;
      background: linear-gradient(135deg,#95a5a6,#7f8c8d);
    }

    /* bar colours */
    .bar-initiation    { background: linear-gradient(135deg,#e74c3c,#c0392b); }
    .bar-requirements  { background: linear-gradient(135deg,#f39c12,#e67e22); }
    .bar-prototype     { background: linear-gradient(135deg,#3498db,#2980b9); }
    .bar-development   { background: linear-gradient(135deg,#95a5a6,#7f8c8d); }
    .bar-testing       { background: linear-gradient(135deg,#9b59b6,#8e44ad); }
    .bar-training      { background: linear-gradient(135deg,#1abc9c,#16a085); }
    .bar-golive        { background: linear-gradient(135deg,#e67e22,#d35400); }
    .bar-deliverable   { background: linear-gradient(135deg,#f1c40f,#f39c12); color:#2c3e50; }
    .bar-milestone     { background: linear-gradient(135deg,#e74c3c,#c0392b); }
    .bar-campaign      { background: linear-gradient(135deg,#1abc9c,#0e8068);
                         height:28px !important; box-shadow:0 3px 12px rgba(26,188,156,.55) !important; }

    /* phase-row colour overrides */
    tr.phase-row .bar-initiation    { background: linear-gradient(135deg,#e74c3c,#c0392b); }
    tr.phase-row .bar-requirements  { background: linear-gradient(135deg,#f39c12,#e67e22); }
    tr.phase-row .bar-prototype     { background: linear-gradient(135deg,#3498db,#2980b9); }
    tr.phase-row .bar-development   { background: linear-gradient(135deg,#27ae60,#229954); }
    tr.phase-row .bar-testing       { background: linear-gradient(135deg,#9b59b6,#8e44ad); }
    tr.phase-row .bar-training      { background: linear-gradient(135deg,#1abc9c,#16a085); }
    tr.phase-row .bar-golive        { background: linear-gradient(135deg,#e67e22,#d35400); }

    /* ── Legend ───────────────────────────────────────────────────── */
    .legend { padding: 24px 32px; background: #f8f9fa; border-top: 3px solid #e9ecef; }
    .legend h3 { margin-bottom: 12px; color: #2c3e50; font-size: 16px; }
    .legend-grid {
      display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 10px;
    }
    .legend-item { display: flex; align-items: center; font-size: 12px; color: #555; }
    .legend-box {
      width: 28px; height: 16px; border-radius: 3px;
      margin-right: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.2);
      flex-shrink: 0;
    }

    /* ── Footer ───────────────────────────────────────────────────── */
    .footer {
      padding: 14px 32px; text-align: center;
      background: #2c3e50; color: white; font-size: 11px;
    }

    @media print {
      body { background: white; }
      .container { box-shadow: none; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- rendered by JS -->
</div>

<script>
/* ════════════════════════════════════════════════════════════════════
   ██████████████████  ADMINISTRATION SECTION  ████████████████████████
   ════════════════════════════════════════════════════════════════════

   All project content lives here. To update the chart:
     • Change PROJECT.title / subtitle.
     • Set TIMELINE_START (month 1–12 and year) — all columns are generated
       automatically from the furthest bar end-index in ROWS.
       The current month is detected automatically; no manual today:true needed.
     • Each row in ROWS is an object:
         label     – text in the left column
         type      – "phase" | "task" | "campaign" | "deliverable"
         bars      – array of { start, end, color, label }
                       start / end are 0-based indices into TIMELINE
                       color is one of the bar-* class suffixes listed below
         (no bars) – empty row (section spacer not needed, just omit bars)

   Bar color keys:
     initiation | requirements | prototype | development
     testing    | training     | golive    | deliverable
     milestone  | campaign

   ════════════════════════════════════════════════════════════════════ */

const PROJECT = {
  title:    "COMIS PROJECT IMPLEMENTATION PLAN",
  notes:    "Production environment readiness delayed to August 2026 | " +
            "Development estimate till Phase 1 go-live",
  version:  "v2.0 — June 2026",
};

// ── Timeline config ───────────────────────────────────────────────────────────
// Only change TIMELINE_START; the number of columns is derived automatically
// from the furthest bar end-index in ROWS, and today's column is auto-highlighted.
const TIMELINE_START = { month: 6, year: 2026 };  // ← start month (1–12) and year

// Task rows
// start/end are column indices (0-based, inclusive)
const ROWS = [

  { label: "Primary Coop registration",  type: "phase",
    bars: [{ start:0, end:0.5, color:"development", label:"Regis" }] },
  { label: "- UI", type: "task",
    bars: [{ start:0, end:0.5, color:"UI",    label:"UI" }] },
  { label: "- BE", type: "task",
    bars: [{ start:0, end:0.5, color:"BE",    label:"BE" }] },

  { label: "Bylaws Amendment",  type: "phase",
    bars: [{ start:0, end:0.99, color:"development", label:"Bylaws" }] },
    { label: "- BA", type: "task",
    bars: [{ start:0, end:0.5,  color:"BA", label:"BA" }] },
  { label: " - UI", type: "task",
    bars: [{ start:0.5, end:1,  color:"UI", label:"UI" }] },
  { label: " - BE", type: "task",
    bars: [{ start:0.5, end:1,  color:"BE", label:"BE" }] },

  { label: "Union coop registration",  type: "phase",
    bars: [{ start:0.5, end:1.5, color:"development", label:"Union" }] },
    { label: "- BA", type: "task",
    bars: [{ start:0.5, end:1,  color:"BA", label:"BA" }] },
  { label: " - UI", type: "task",
    bars: [{ start:1, end:1.5,  color:"UI", label:"UI" }] },
  { label: " - BE", type: "task",
    bars: [{ start:1, end:1.5,  color:"BE", label:"BE" }] },

  { label: "Member management",  type: "phase",
    bars: [{ start:0.5, end:2, color:"development", label:"Members" }] },
    { label: "- BA", type: "task",
    bars: [{ start:0.5, end:0.99,  color:"BA", label:"BA" }] },
  { label: " - UI", type: "task",
    bars: [{ start:1, end:2,  color:"UI", label:"UI" }] },
  { label: " - BE", type: "task",
    bars: [{ start:1, end:2,  color:"BE", label:"BE" }] },

  { label: "Grievance",  type: "phase",
    bars: [{ start:0.5, end:1.99, color:"development", label:"Grievance" }] },
    { label: "- BA", type: "task",
    bars: [{ start:0.5, end:0.99,  color:"BA", label:"BA" }] },
  { label: " - UI", type: "task",
    bars: [{ start:1, end:1.99,  color:"UI", label:"UI" }] },
  { label: " - BE", type: "task",
    bars: [{ start:1, end:1.99,  color:"BE", label:"BE" }] },

  { label: "Post-training",  type: "phase",
    bars: [{ start:0.5, end:1.5, color:"development", label:"Post-training" }] },
    { label: "- BA", type: "task",
    bars: [{ start:0.5, end:0.99,  color:"BA", label:"BA" }] },
  { label: " - UI", type: "task",
    bars: [{ start:1, end:1.5,  color:"UI", label:"UI" }] },
  { label: " - BE", type: "task",
    bars: [{ start:1, end:1.5,  color:"BE", label:"BE -SL" }] },
  

  { label: "Dissolution",  type: "phase",
    bars: [{ start:1, end:1.99, color:"development", label:"Dissolution" }] },
    { label: "- BA", type: "task",
    bars: [{ start:1, end:1.5,  color:"BA", label:"BA" }] },
  { label: " - UI", type: "task",
    bars: [{ start:1.5, end:1.99,  color:"UI", label:"UI" }] },
  { label: " - BE", type: "task",
    bars: [{ start:1.5, end:1.99,  color:"BE", label:"BE -SL" }] },

    /*-------------------------------*/
  { label: " - DevOps Env. Setup", type: "phase",
    bars: [{ start:1, end:1.99, color:"requirements", label:"DevOps" }] },

  { label: " - NRB Integration", type: "task",
    bars: [{ start:2, end:2.5, color:"development", label:"NRB" }] },

  /* ── Phase 4: UAT Phase 1 ────────────────────────────────── */
  { label: "UAT Phase 1",      type: "phase",
    bars: [{ start:2.5, end:2.99, color:"testing",    label:"UAT" }] },

  { label: " - UAT",                    type: "task",
    bars: [{ start:2.5, end:2.99, color:"UAT",   label:"UAT" }] },

  { label: " - Training",               type: "task",
    bars: [{ start:2.5, end:2.99, color:"UAT",   label:"TRAIN" }] },
  { label: " - Golive",               type: "task",
    bars: [{ start:2.99, end:3.09, color:"golive",   label:"" }] },

    
  /* ── Phase 5: Registration Campaign ─────────────────────── */
  { label: " Registration Campaign", type: "campaign",
    bars: [{ start:3, end:6.99, color:"campaign",   label:"CAMPAIGN" }] },

];

// Auto-generated from ROWS — do not edit this block
const TIMELINE = (() => {
  const ABBR = ["Jan","Feb","Mar","Apr","May","Jun",
                "Jul","Aug","Sep","Oct","Nov","Dec"];
  const now    = new Date();
  const todayM = now.getMonth() + 1;   // 1-based
  const todayY = now.getFullYear();
  const count  = ROWS.reduce((max, row) =>
    (row.bars || []).reduce((m, b) => Math.max(m, Math.floor(b.end ?? 0)), max), 0) + 1;
  return Array.from({ length: count }, (_, i) => {
    const offset = (TIMELINE_START.month - 1) + i;   // 0-based from Jan
    const m = (offset % 12) + 1;                     // 1-based month
    const y = TIMELINE_START.year + Math.floor(offset / 12);
    const col = { label: `${ABBR[m - 1]}\n${y}` };
    if (m === todayM && y === todayY) col.today = true;
    return col;
  });
})();

/* ════════════════════════════════════════════════════════════════════
   END OF ADMINISTRATION SECTION — do not edit below unless needed
   ════════════════════════════════════════════════════════════════════ */

const LEGEND_ITEMS = [
  { color:"bar-initiation",   label:"Project Initiation",  hex:"#e74c3c" },
  { color:"bar-requirements", label:"Requirements / Spec",  hex:"#f39c12" },
  { color:"bar-prototype",    label:"Prototyping / Design", hex:"#3498db" },
  { color:"bar-development",  label:"Development",          hex:"#27ae60" },
  { color:"bar-testing",      label:"Testing / UAT",        hex:"#9b59b6" },
  { color:"bar-training",     label:"Training",             hex:"#1abc9c" },
  { color:"bar-golive",       label:"Go-Live",              hex:"#e67e22" },
  { color:"bar-deliverable",  label:"Deliverable",          hex:"#f1c40f" },
  { color:"bar-campaign",     label:"Registration Campaign",hex:"#1abc9c" },
];

// ── Render ────────────────────────────────────────────────────────

function buildCells(row) {
  const n = TIMELINE.length;

  // Normalise each bar: support decimal start/end (e.g. 0.5 = mid-month)
  const bars = (row.bars || []).map(b => {
    const colStart = Math.floor(b.start);   // first column index
    const colEnd   = Math.floor(b.end);     // last column index
    const span     = colEnd - colStart + 1; // integer colspan

    // Fractional positioning within the spanned columns
    const totalCols = colEnd - colStart + 1;
    const leftFrac  = (b.start - colStart) / totalCols;
    const rightFrac = (colEnd + 1 - b.end) / totalCols;
    const widthFrac = 1 - leftFrac - rightFrac;

    const leftPct  = (leftFrac  * 100).toFixed(2) + "%";
    const widthPct = (widthFrac * 100).toFixed(2) + "%";

    const barHtml =
      '<div style="position:absolute;top:50%;transform:translateY(-50%);' +
      'left:' + leftPct + ';width:' + widthPct + ';padding:0 2px;box-sizing:border-box;">' +
      '<div class="bar bar-' + b.color + '">' + b.label + '</div></div>';

    return { colStart, span, barHtml };
  });

  // Map colStart → merged entry (support multiple bars per cell)
  const barMap = {};
  bars.forEach(b => {
    if (!barMap[b.colStart]) barMap[b.colStart] = { span: b.span, barHtmls: [] };
    barMap[b.colStart].span = Math.max(barMap[b.colStart].span, b.span);
    barMap[b.colStart].barHtmls.push(b.barHtml);
  });

  let html = "";
  let skip = 0;
  for (let c = 0; c < n; c++) {
    if (skip > 0) { skip--; continue; }
    const todayCls = /*TIMELINE[c].today ? " today-col" :*/ "";
    if (barMap[c]) {
      const { span, barHtmls } = barMap[c];
      const colAttr = span > 1 ? ' colspan="' + span + '"' : "";
      html += '<td class="gantt-cell' + todayCls + '" style="position:relative;"' + colAttr + '>' + barHtmls.join("") + '</td>';
      skip = span - 1;
    } else {
      html += '<td class="gantt-cell' + todayCls + '"></td>';
    }
  }
  return html;
}

function render() {
  const todayIdx = TIMELINE.findIndex(t => t.today);

  // Header columns
  const thCols = TIMELINE.map((t, i) => {
    const isToday = t.today;
    const lines = t.label.split("\n");
    return `<th${isToday ? ' class="today-col"' : ""}>
      ${lines[0]}<br>${lines[1]}${isToday ? `<span class="today-label">TODAY</span>` : ""}
    </th>`;
  }).join("");

  // Body rows
  const bodyRows = ROWS.map(row => {
    const rowClass = row.type === "phase"       ? "phase-row"
                   : row.type === "campaign"    ? "phase-row campaign-row"
                   : row.type === "deliverable" ? "deliverable-row"
                   : "";
    const taskTodayCls = TIMELINE[todayIdx]?.today ? "" : ""; // task col never gets today highlight
    return `<tr class="${rowClass}">
      <td class="task-col">${row.label}</td>
      ${buildCells(row)}
    </tr>`;
  }).join("");

  // Legend
  const legendHtml = LEGEND_ITEMS.map(l =>
    `<div class="legend-item">
      <div class="legend-box" style="background:${l.hex}"></div>${l.label}
    </div>`
  ).join("");

  document.getElementById("app").innerHTML = `
    <div class="header">
      <h1>${PROJECT.title}</h1>
      <div class="subtitle">${PROJECT.notes}</div>
    </div>

    <div class="gantt-wrapper">
      <table class="gantt-table">
        <colgroup>
          <col style="width:250px">
          ${TIMELINE.map(() => '<col>').join('')}
        </colgroup>
        <thead>
          <tr>
            <th class="task-col"></th>
            ${thCols}
          </tr>
        </thead>
        <tbody>
          ${bodyRows}
        </tbody>
      </table>
    </div>

    <!--<div class="legend">
      <h3>Legend</h3>
      <div class="legend-grid">${legendHtml}</div>
    </div>-->

    <div class="footer">
      COMIS Project Plan &nbsp;|&nbsp; ${PROJECT.version} &nbsp;|&nbsp; MNS Ltd
    </div>
  `;
}

render();
</script>
</body>
</html>
